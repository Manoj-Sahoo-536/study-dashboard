<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Perfect dark slate-gray circle with fully transparent canvas background -->
  <circle cx="256" cy="256" r="256" fill="#1e293b"/>
  
  <!-- Glowing neon cyan atom symbol -->
  <g stroke="#22d3ee" stroke-width="28" fill="none">
    <!-- Orbital 1 (Vertical) -->
    <ellipse cx="256" cy="256" rx="90" ry="180" transform="rotate(0 256 256)"/>
    <!-- Orbital 2 (Rotated 60 deg) -->
    <ellipse cx="256" cy="256" rx="90" ry="180" transform="rotate(60 256 256)"/>
    <!-- Orbital 3 (Rotated 120 deg) -->
    <ellipse cx="256" cy="256" rx="90" ry="180" transform="rotate(120 256 256)"/>
  </g>

  <!-- Center nucleus -->
  <circle cx="256" cy="256" r="32" fill="#22d3ee"/>

  <!-- Electrons (positioned at the top points of the orbits) -->
  <g fill="#22d3ee">
    <!-- Top of vertical orbital -->
    <circle cx="256" cy="76" r="24" transform="rotate(0 256 256)"/>
    <!-- Top-right of 60 deg orbital -->
    <circle cx="256" cy="76" r="24" transform="rotate(60 256 256)"/>
    <!-- Bottom-right of 120 deg orbital -->
    <circle cx="256" cy="76" r="24" transform="rotate(120 256 256)"/>
  </g>
</svg>
